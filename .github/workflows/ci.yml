name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  macos-go:
    name: Go tests on macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Run tests
        run: go test ./...

  windows-python:
    name: Python mic backend on Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run unit tests
        run: python -m unittest discover -s tests

      - name: Run simulated detector
        run: python main.py --simulate --duration 1.5 --no-playback --stdio
